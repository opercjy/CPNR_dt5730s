# ==============================================================================
# CAEN DT5730S DAQ Configuration - External Clock & Trigger Synchronization
# 다중 보드 또는 외부 하드웨어와의 클록/트리거 연동 테스트용 설정입니다.
# ==============================================================================

[Digitizer]
RecordLength=1024
ChannelMask=1
PostTrigger=70
TriggerPolarity=1
# 자체 채널 트리거를 끄고, 전면 패널의 TRG-IN 포트로 들어오는 신호로만 기록합니다.
ExtTriggerMode=1
SelfTriggerMode=0

[Synchronization]
# 0: Internal, 1: External (전면 패널 CLK-IN 포트 사용)
ClockSource=1
# 0: Disabled, 1: Daisy Chain, 2: TRG-IN 활용 동기화
RunSyncMode=1

[SoftwareDSP]
BaselineSamples=150
ShortGate=150
LongGate=600

[Channel_0]
# 90% 베이스라인, 15mV 뎁스 적용
DCOffset=58981
TriggerThreshold=14622