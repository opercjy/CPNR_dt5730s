# ==============================================================================
# CAEN DT5730S DAQ Configuration File (Universal for Inorganic Scintillators)
# Target: NaI(Tl), CsI(Tl), BGO 등 무기 섬광체 범용 세팅
# 
# [DT5730S Hardware Specifications 요약]
# 1. 샘플링 속도 (X축): 500 MS/s -> [ 1 Sample = 2 ns ]
# 2. ADC 분해능 (Y축 읽기): 14-bit -> [ 값 범위: 0 ~ 16383 ]
# 3. ADC 동적 범위      : 2 Vpp   -> [ 1 LSB = 2000 mV / 16384 = 약 0.122 mV ]
# 4. DAC 분해능 (Y축 조절): 16-bit -> [ 값 범위: 0 ~ 65535 ]
# ==============================================================================

[Digitizer]
# -----------------------------------------------------------
# RecordLength: 1개 이벤트당 캡처할 총 파형 길이 (단위: Samples)
# - 2048 Samples * 2 ns = 4096 ns (약 4.1 us)
# - NaI(Tl) 파형을 넉넉하게 담으며, 붕괴 시간이 긴 CsI(Tl) 검출기에도 완벽히 대응합니다.
# -----------------------------------------------------------
RecordLength=2048

# -----------------------------------------------------------
# ChannelMask: 활성화할 채널 비트마스크 (00000001)
# - 불필요한 데이터 I/O를 막기 위해 현재 신호가 들어오는 CH0만 활성화.
# -----------------------------------------------------------
ChannelMask=1

# -----------------------------------------------------------
# PostTrigger: 전체 파형 중 '트리거 발생 이후' 데이터의 비율 (%)
# - 80으로 설정 시: 총 2048 샘플 중 앞의 약 410 샘플(820 ns)은 펄스 이전(Pre)의 베이스라인으로,
#   뒤의 약 1638 샘플(3276 ns)은 펄스(Post)를 담아내는 데 사용됩니다.
# -----------------------------------------------------------
PostTrigger=80

# -----------------------------------------------------------
# TriggerPolarity: 입력 신호 극성 (0 = Positive, 1 = Negative)
# - PMT Anode 직결 시 펄스가 밑으로 떨어지므로 반드시 '1 (Negative)' 사용.
# -----------------------------------------------------------
TriggerPolarity=1

# 자체 트리거 모드 활성화 (단일 보드)
ExtTriggerMode=0
SelfTriggerMode=1

[Synchronization]
# 다중 보드 동기화 (단일 보드이므로 0)
ClockSource=0
RunSyncMode=0

[SoftwareDSP]
# -----------------------------------------------------------
# 펄스 에너지 적분 파라미터 (단위: Samples, 1 Sample = 2 ns)
# (이 시간들은 PostTrigger로 확보된 영역 내에서 작동해야 합니다)
# -----------------------------------------------------------

# BaselineSamples: 트리거 발생 전, 0점(베이스라인)을 계산할 샘플 수
# - 150 Samples = 300 ns. (Pre-trigger로 확보된 820 ns 공간 내에서 300 ns 동안의 노이즈를 평균냅니다)
BaselineSamples=150

# ShortGate: 펄스 시작점부터 빠른 성분(Fast Component)을 적분할 길이
# - 150 Samples = 300 ns. (PSD 분석 시 Fast/Slow 비율 계산용)
ShortGate=150

# LongGate: 전체 에너지(Total Charge)를 적분할 길이
# - 1500 Samples = 3000 ns (3.0 us).
# - Post-trigger로 확보된 3276 ns 윈도우 안에 안전하게 들어가며, 
#   NaI(Tl) 뿐만 아니라 붕괴 시간이 긴 CsI(Tl)의 에너지까지 남김없이 적분합니다.
LongGate=1500

[Channel_0]
# ===========================================================
# [DC Offset / Trigger Threshold 가이드]
# 1. DCOffset: 32768 (16-bit DAC의 50%) 
#    -> 베이스라인을 ADC 화면(14-bit) 중간인 8192 부근에 강제 고정.
#    -> 위/아래로 각각 1V 크기의 펄스를 수용할 수 있는 완벽한 중간 정렬입니다.
#
# 2. TriggerThreshold: 베이스라인(약 8192)을 기준으로 한 트리거 컷.
#    - 현재 현장 베이스라인(약 8180)에서 노이즈(±20)를 피하기 위해
#      약 130 Bins (약 16 mV) 낮춘 8050으로 설정했습니다.
# ===========================================================
DCOffset=32768
TriggerThreshold=8050

[Channel_1]
DCOffset=32768
TriggerThreshold=8050

[Channel_2]
DCOffset=32768
TriggerThreshold=8050

[Channel_3]
DCOffset=32768
TriggerThreshold=8050

[Channel_4]
DCOffset=32768
TriggerThreshold=8050

[Channel_5]
DCOffset=32768
TriggerThreshold=8050

[Channel_6]
DCOffset=32768
TriggerThreshold=8050

[Channel_7]
DCOffset=32768
TriggerThreshold=8050