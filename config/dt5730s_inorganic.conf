# ==============================================================================
# CAEN DT5730S DAQ Configuration File (Master Edition for NaI(Tl))
# 작성 목적: 무기 섬광체 데이터 수집 및 디지타이저 제1원리 교육용
# 
# [핵심 하드웨어 스펙]
# 1. 시간축 (X축) : 500 MS/s -> [ 1 Sample = 2 ns (나노초) ]
# 2. 신호축 (Y축) : 14-bit ADC -> [ 0 ~ 16383 ], 동적 범위 2 Vpp (1 Bin ≒ 0.122 mV)
# 3. 오프셋 (조절) : 16-bit DAC -> [ 0 ~ 65535 ]
# ==============================================================================

[Digitizer]
# -----------------------------------------------------------
# [1] RecordLength: 1개 이벤트당 캡처할 총 파형 길이 (단위: Samples)
# - 원리: 1024 Samples * 2 ns = 2048 ns (약 2.0 us)의 시간 창(Window)을 엽니다.
# - 이유: NaI(Tl)의 붕괴 시간(Decay Time)은 약 250 ns입니다.
#   2.0 us는 펄스가 시작되고 베이스라인으로 완전히 복귀하기까지 
#   충분하고도 넘치는 최적의 길이이며, USB 전송 대역폭 낭비를 막아줍니다.
# -----------------------------------------------------------
RecordLength=1024

# -----------------------------------------------------------
# [2] ChannelMask: 활성화할 채널을 10진수 비트마스크로 설정
# - 원리: 2진수 00000001 = 10진수 1 (CH0만 켬)
# - 이유: 안 쓰는 채널을 켜두면 디스크 용량과 처리 속도만 8배로 낭비됩니다.
# -----------------------------------------------------------
ChannelMask=1

# -----------------------------------------------------------
# [3] PostTrigger: 트리거가 걸린 시점을 기준으로 한 파형의 분할 비율 (%)
# - 설정: 70% 
# - 원리: 전체 1024 샘플 중 앞의 30%(약 307 샘플)는 펄스 이전(Pre)의 노이즈로,
#         뒤의 70%(약 717 샘플)는 실제 펄스(Post)로 기록합니다.
# - ⚠️ 핵심 팁: 80% 이상으로 높일 경우, 하드웨어 내부의 트리거 논리 회로가 
#   닫히면서 발생하는 스위칭 전압 노이즈(델타 함수 형태의 가짜 펄스)가 
#   베이스라인 구간을 침범할 수 있습니다. 70%가 가장 안전한 타협점입니다.
# -----------------------------------------------------------
PostTrigger=70

# -----------------------------------------------------------
# [4] TriggerPolarity: 입력 신호의 방향성 (0 = Positive, 1 = Negative)
# - 이유: PMT(광전자증폭관)의 Anode에서 직접 뽑은 신호는 전자가 쏟아져 나오며
#   음극성(Negative, 파형이 밑으로 파임)을 띄므로 반드시 1을 사용합니다.
# -----------------------------------------------------------
TriggerPolarity=1

# 단일 보드 구동을 위한 자체 트리거(Self-Trigger) 모드
ExtTriggerMode=0
SelfTriggerMode=1

[Synchronization]
# 다중 보드 동기화 끔 (단일 보드)
ClockSource=0
RunSyncMode=0

[SoftwareDSP]
# ===========================================================
# [5] Edge Computing 파라미터 (단위: Samples, 1 Sample = 2 ns)
# ⚠️ 주의사항: 아래 설정값들은 X축의 물리적 한계를 절대 넘을 수 없습니다!
# ===========================================================

# BaselineSamples: 트리거 발생 전, 0점(베이스라인)의 평균을 낼 샘플 개수
# - 설정: 150 Samples (300 ns)
# - 원리: Pre-trigger로 확보된 약 307 샘플의 공간 안에서 작동합니다.
#   트리거 직전의 스위칭 노이즈를 피하기 위해 307개 전체를 쓰지 않고 
#   가장 평탄한 150개만 사용하여 극도로 안정적인 영점을 잡습니다.
BaselineSamples=150

# ShortGate: 빠른 성분(Fast Component)의 면적만 적분할 길이
# - 설정: 150 Samples (300 ns)
# - 원리: QShort 변수에 저장되며, 파형의 모양을 분석(PSD)할 때 사용됩니다.
ShortGate=150

# LongGate: 펄스의 전체 전하량(Total Charge ∝ Energy)을 적분할 길이
# - 설정: 600 Samples (1200 ns)
# - 원리: Post-trigger로 확보된 717 샘플 윈도우 안에 안전하게 들어가는 수치입니다.
#   1200 ns면 NaI(Tl)의 붕괴 시간(250 ns)의 거의 5배에 달하므로 
#   꼬리(Tail) 부분의 미세한 에너지까지 단 1픽셀도 놓치지 않고 모조리 적분합니다.
LongGate=600

[Channel_0]
# ===========================================================
# [6] 하드웨어 조준경 설정 (고에너지 음극 펄스 최적화 - Asymmetric Range)
# ===========================================================
# DCOffset (0 ~ 65535): 베이스라인을 Y축 상단(90%)으로 밀어올립니다.
# - 계산: 65535 * 0.90 = 약 58981
# - 결과: 14-bit ADC 화면의 약 90% 높이인 'ADC 14745' 부근에 베이스라인 안착.
# - 효과: 위로는 10%(노이즈 마진)를 남기고, 아래로는 무려 90%(약 1.8V, ADC 14700 Bins)
#         라는 거대한 공간을 확보하여 우주선(Muon)의 거대 펄스도 클리핑 없이 담아냅니다.
DCOffset=32768

# TriggerThreshold (0 ~ 16383): 트리거 컷 (절대적 Y축 높이)
# - 계산: 예상 베이스라인(14745) - 노이즈 컷(130 Bins) = 14615
# - 주의: 실제 보드의 온도나 상태에 따라 베이스라인이 14745가 아닐 수 있습니다.
#   반드시 파이썬 모니터링 툴을 켜고 실제 평평한 베이스라인 Y축 값을 읽은 뒤,
#   그 값에서 100~150 정도 뺀 값을 여기에 최종 기입해야 완벽합니다.
TriggerThreshold=6680

[Channel_1]
DCOffset=58981
TriggerThreshold=14615

[Channel_2]
DCOffset=58981
TriggerThreshold=14615

[Channel_3]
DCOffset=58981
TriggerThreshold=14615

[Channel_4]
DCOffset=58981
TriggerThreshold=14615

[Channel_5]
DCOffset=58981
TriggerThreshold=14615

[Channel_6]
DCOffset=58981
TriggerThreshold=14615

